<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Anomaly Tracker — Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #1c2333;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --red: #f43f5e;
      --orange: #f97316;
      --blue: #3b82f6;
      --purple: #a855f7;
      --green: #34d399;
      --cyan: #22d3ee;
      --yellow: #facc15;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══════ TOPBAR ══════ */
    .topbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      z-index: 1000;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-logo { font-size: 1.2rem; }
    .topbar-title { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); }
    .topbar-right { display: flex; align-items: center; gap: 20px; }

    .ws-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.72rem; font-weight: 600; color: var(--text-secondary);
    }
    .ws-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); transition: background 0.3s;
    }
    .ws-dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.6); }

    .stat-pills { display: flex; gap: 8px; }
    .stat-pill {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-pill .val { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }

    /* ══════ MAP ══════ */
    .main-container { flex: 1; display: flex; overflow: hidden; }

    #map { flex: 1; z-index: 1; background: #000; }
    /* Filtro solo para la capa base (satélite) para no oscurecer los textos/fronteras */
    .dark-base-layer { filter: brightness(0.5) contrast(1.2) saturate(0.8); }
    .leaflet-control-attribution { display: none !important; }

    /* ══════ SIDEBAR ══════ */
    .sidebar {
      width: 380px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 2;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-size: 0.82rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--cyan); margin-bottom: 12px;
    }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem; font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--cyan); color: var(--text-primary); }
    .filter-btn.active { background: rgba(34,211,238,0.12); border-color: var(--cyan); color: var(--cyan); }

    .alert-list {
      flex: 1; overflow-y: auto; padding: 12px;
    }
    .alert-list::-webkit-scrollbar { width: 4px; }
    .alert-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ══════ ALERT CARD ══════ */
    .alert-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid var(--border);
    }
    .alert-card:hover { border-color: #484f58; transform: translateX(-2px); }
    .alert-card.sev-critica { border-left-color: var(--red); }
    .alert-card.sev-alta { border-left-color: var(--orange); }
    .alert-card.sev-media { border-left-color: var(--yellow); }
    .alert-card.sev-baja { border-left-color: var(--green); }

    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .card-type { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-sev {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      padding: 2px 8px; border-radius: 4px;
    }
    .sev-critica .card-sev { background: rgba(244,63,94,0.15); color: var(--red); }
    .sev-alta .card-sev { background: rgba(249,115,22,0.15); color: var(--orange); }
    .sev-media .card-sev { background: rgba(250,204,21,0.15); color: var(--yellow); }
    .sev-baja .card-sev { background: rgba(52,211,153,0.15); color: var(--green); }

    .card-body { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5; }
    .card-body strong { color: var(--text-primary); }
    .card-time {
      font-size: 0.65rem; color: #484f58; margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--text-secondary); gap: 12px;
    }
    .empty-state .icon { font-size: 2.5rem; opacity: 0.4; }
    .empty-state p { font-size: 0.82rem; }
  </style>
</head>
<body>

  <!-- ══════ TOPBAR ══════ -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🛫</span>
      <span class="topbar-title">Flight Anomaly Tracker</span>
    </div>
    <div class="topbar-right">
      <div class="stat-pills">
        <div class="stat-pill">🚨 Alertas <span class="val" id="stat-total">0</span></div>
        <div class="stat-pill" style="color:var(--red);">⚠️ Críticas <span class="val" id="stat-criticas">0</span></div>
      </div>
      <div class="ws-status">
        <div class="ws-dot" id="ws-dot"></div>
        <span id="ws-label">Desconectado</span>
      </div>
    </div>
  </div>

  <!-- ══════ MAIN ══════ -->
  <div class="main-container">
    <div id="map"></div>

    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">🚨 Alertas en Tiempo Real</div>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">Todas</button>
          <button class="filter-btn" data-filter="vertical">⚠️ Vertical</button>
          <button class="filter-btn" data-filter="alta_densidad">📡 Densidad</button>
          <button class="filter-btn" data-filter="zona_muerta">🗺️ Zona Muerta</button>
          <button class="filter-btn" data-filter="cep_aterrizaje_emergencia">🧩 CEP</button>
          <button class="filter-btn" data-filter="critica" style="margin-left:auto;">🔴 Crítica</button>
        </div>
      </div>
      <div class="alert-list" id="alert-list">
        <div class="empty-state" id="empty-state">
          <div class="icon">📡</div>
          <p>Esperando alertas...</p>
          <p style="font-size:0.7rem;">Conectando al WebSocket</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ══════════════════════════════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════════════════════════════
    const WS_URL = `ws://${window.location.host}/ws/alerts`;
    const API_URL = `http://${window.location.host}`;
    const MAX_MARKERS = 300;      // Máx markers visibles en el mapa
    const MAX_SIDEBAR_CARDS = 80; // Máx tarjetas en el sidebar

    const ALERT_COLORS = {
      vertical: '#f43f5e',
      alta_densidad: '#f97316',
      zona_muerta: '#3b82f6',
      cep_aterrizaje_emergencia: '#a855f7',
    };
    const ALERT_ICONS = {
      vertical: '⚠️',
      alta_densidad: '📡',
      zona_muerta: '🗺️',
      cep_aterrizaje_emergencia: '🧩',
    };

    // ══════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════
    let alerts = [];
    let markerQueue = [];         // Cola FIFO de markers para rotación
    let activeFilter = 'all';
    let ws = null;
    let reconnectDelay = 1000;
    let totalAlertas = 0;
    let totalCriticas = 0;
    let renderScheduled = false;

    // ══════════════════════════════════════════════════════════════
    // MAP — Canvas renderer (10x más rápido que SVG/DOM)
    // ══════════════════════════════════════════════════════════════
    const canvasRenderer = L.canvas({ padding: 0.5 });

    const map = L.map('map', {
      center: [30, 0],
      zoom: 3,
      zoomControl: false,
      preferCanvas: true,
    });

    // 1. Mapa satelital con relieve (ESRI World Imagery) como base
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19,
      className: 'dark-base-layer'
    }).addTo(map);

    // 2. Capa transparente con fronteras y nombres de países (ESRI Reference)
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19,
    }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Layer group para todos los markers
    const markerLayer = L.layerGroup().addTo(map);

    // ══════════════════════════════════════════════════════════════
    // WEBSOCKET — Recibe batches de alertas
    // ══════════════════════════════════════════════════════════════
    function connectWS() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        document.getElementById('ws-dot').classList.add('connected');
        document.getElementById('ws-label').textContent = 'Conectado';
        reconnectDelay = 1000;
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        // El backend envía arrays (batches)
        const batch = Array.isArray(data) ? data : [data];
        batch.forEach(a => handleNewAlert(a));
        scheduleRender();
      };

      ws.onclose = () => {
        document.getElementById('ws-dot').classList.remove('connected');
        document.getElementById('ws-label').textContent = 'Reconectando...';
        setTimeout(connectWS, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      };

      ws.onerror = () => ws.close();
    }

    // ══════════════════════════════════════════════════════════════
    // ALERT HANDLING
    // ══════════════════════════════════════════════════════════════
    function handleNewAlert(alerta) {
      alerts.unshift(alerta);
      // Mantener array controlado para no crecer infinito
      if (alerts.length > 2000) alerts.length = 2000;

      totalAlertas++;
      if (alerta.severidad === 'critica') totalCriticas++;

      addMarker(alerta);

      const empty = document.getElementById('empty-state');
      if (empty) empty.style.display = 'none';
    }

    function addMarker(alerta) {
      const lat = alerta.latitud;
      const lon = alerta.longitud;
      if (lat == null || lon == null) return;

      const color = ALERT_COLORS[alerta.tipo_alerta] || '#8b949e';

      // CircleMarker renderizado en Canvas — cero DOM, ultrarrápido
      const marker = L.circleMarker([lat, lon], {
        renderer: canvasRenderer,
        radius: alerta.severidad === 'critica' ? 8 : alerta.severidad === 'alta' ? 6 : 5,
        fillColor: color,
        fillOpacity: 0.7,
        color: color,
        weight: 2,
        opacity: 0.9,
      });

      marker.bindPopup(() => buildPopup(alerta), {
        className: 'dark-popup',
        maxWidth: 280,
      });

      markerLayer.addLayer(marker);
      markerQueue.push(marker);

      // Rotar: si hay más de MAX_MARKERS, eliminar el más antiguo
      while (markerQueue.length > MAX_MARKERS) {
        const old = markerQueue.shift();
        markerLayer.removeLayer(old);
      }
    }

    function buildPopup(a) {
      let details = '';
      if (a.tipo_alerta === 'vertical') {
        details = `
          <b>Callsign:</b> ${a.callsign || 'N/A'}<br>
          <b>ICAO24:</b> ${a.icao24 || 'N/A'}<br>
          <b>Altitud:</b> ${a.altitud_actual ?? '?'}m → ${a.altitud_previa ?? '?'}m<br>
          <b>Δ Altitud:</b> ${a.delta_altitud ?? 0}m<br>
          <b>Vel. Vertical:</b> ${a.velocidad_vertical_ms ?? 0} m/s`;
      } else if (a.tipo_alerta === 'alta_densidad') {
        details = `
          <b>Celda H3:</b> ${a.celda_h3 || 'N/A'}<br>
          <b>Vuelos:</b> ${a.num_vuelos_actual || 0}<br>
          <b>Afectados:</b> ${(a.vuelos_afectados || []).join(', ') || 'N/A'}`;
      } else if (a.tipo_alerta === 'zona_muerta') {
        details = `
          <b>Celda H3:</b> ${a.celda_h3 || 'N/A'}<br>
          <b>Vuelos ahora:</b> ${a.num_vuelos_actual || 0}<br>
          <b>Vuelos antes:</b> ${a.num_vuelos_previo || 0}`;
      } else if (a.tipo_alerta === 'cep_aterrizaje_emergencia') {
        details = `
          <b>Callsign:</b> ${a.callsign || 'N/A'}<br>
          <b>Patrón:</b> ${a.patron || 'N/A'}<br>
          <b>Vel. cero:</b> ${a.duracion_vel_cero_seg || 0}s`;
      }
      return `
        <div style="font-family:Inter,sans-serif;font-size:12px;color:#e6edf3;background:#161b22;padding:4px;border-radius:6px;">
          <div style="font-weight:700;color:${ALERT_COLORS[a.tipo_alerta]};margin-bottom:4px;">
            ${ALERT_ICONS[a.tipo_alerta]} ${a.tipo_alerta.toUpperCase()} — ${a.severidad.toUpperCase()}
          </div>
          ${details}
          <div style="color:#484f58;font-size:10px;margin-top:6px;">${a.timestamp}</div>
        </div>`;
    }

    // ══════════════════════════════════════════════════════════════
    // SIDEBAR — Renderizado con requestAnimationFrame (debounced)
    // ══════════════════════════════════════════════════════════════
    function scheduleRender() {
      if (!renderScheduled) {
        renderScheduled = true;
        requestAnimationFrame(() => {
          renderAlerts();
          renderScheduled = false;
        });
      }
    }

    function renderAlerts() {
      // Actualizar contadores
      document.getElementById('stat-total').textContent = totalAlertas;
      document.getElementById('stat-criticas').textContent = totalCriticas;

      const list = document.getElementById('alert-list');
      let filtered = alerts;

      if (activeFilter !== 'all') {
        if (activeFilter === 'critica') {
          filtered = alerts.filter(a => a.severidad === 'critica');
        } else {
          filtered = alerts.filter(a => a.tipo_alerta === activeFilter);
        }
      }

      // Solo renderizar las primeras MAX_SIDEBAR_CARDS tarjetas
      const visible = filtered.slice(0, MAX_SIDEBAR_CARDS);
      list.innerHTML = visible.map(buildCard).join('');
    }

    function buildCard(a) {
      const icon = ALERT_ICONS[a.tipo_alerta] || '📍';
      let body = '';

      if (a.tipo_alerta === 'vertical') {
        body = `<strong>${a.callsign || a.icao24 || 'N/A'}</strong> — Δ${a.delta_altitud ?? 0}m · ${a.velocidad_kmh ?? 0} km/h`;
      } else if (a.tipo_alerta === 'alta_densidad') {
        body = `Celda <strong>${(a.celda_h3 || '').slice(-7)}</strong> — ${a.num_vuelos_actual || 0} vuelos`;
      } else if (a.tipo_alerta === 'zona_muerta') {
        body = `Celda <strong>${(a.celda_h3 || '').slice(-7)}</strong> — ${a.num_vuelos_previo || 0}→${a.num_vuelos_actual || 0}`;
      } else if (a.tipo_alerta === 'cep_aterrizaje_emergencia') {
        body = `<strong>${a.callsign || a.icao24 || 'N/A'}</strong> — ${a.patron || 'patrón detectado'}`;
      }

      return `
        <div class="alert-card sev-${a.severidad}" onclick="flyTo(${a.latitud},${a.longitud})">
          <div class="card-top">
            <span class="card-type" style="color:${ALERT_COLORS[a.tipo_alerta]}">${icon} ${a.tipo_alerta}</span>
            <span class="card-sev">${a.severidad}</span>
          </div>
          <div class="card-body">${body}</div>
          <div class="card-time">${a.estado} · ${a.origen_pais || 'Zona'} · ${a.timestamp || ''}</div>
        </div>`;
    }

    function flyTo(lat, lon) {
      if (lat != null && lon != null) map.flyTo([lat, lon], 8, { duration: 1 });
    }

    // ══════════════════════════════════════════════════════════════
    // FILTERS
    // ══════════════════════════════════════════════════════════════
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderAlerts();
      });
    });

    // ══════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════
    async function init() {
      // Cargar alertas existentes desde la API
      try {
        const [alertRes, statsRes] = await Promise.all([
          fetch(`${API_URL}/api/v1/alerts?limit=80`),
          fetch(`${API_URL}/stats`),
        ]);
        if (alertRes.ok) {
          const data = await alertRes.json();
          data.alertas.forEach(a => {
            alerts.push(a);
            addMarker(a);
          });
        }
        if (statsRes.ok) {
          const s = await statsRes.json();
          totalAlertas = s.total_alertas;
          totalCriticas = s.alertas_criticas;
        }
        renderAlerts();
        if (alerts.length > 0) {
          document.getElementById('empty-state').style.display = 'none';
        }
      } catch (e) {
        console.log('⏳ API no disponible aún');
      }

      connectWS();
    }

    init();
  </script>
</body>
</html>
