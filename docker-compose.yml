services:
  # ──── KAFKA BROKER (KRaft) ────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "9092:9092" # para tu app Python / Opcional si usas 9094
      - "9094:9094" # Puerto externo recomendado
    environment:
      # KRaft: Kafka gestiona su propio consenso (sin Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # Configuración básica
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      # Generar cluster ID único (solo una vez)
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - flink-network

  # ──── KAFKA UI ─────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - flink-network

  # ──── FLINK CLUSTER ────────────────────────────────────────────
  jobmanager:
    build: .
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    volumes:
      - ./flink_app:/opt/flink/flink_app
    networks:
      - flink-network

  taskmanager:
    build: .
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ./flink_app:/opt/flink/flink_app
    networks:
      - flink-network

  density-alert:
    build: .
    depends_on:
      - kafka
      - jobmanager
      - taskmanager
    volumes:
      - ./flink_app:/opt/flink/flink_app
    command: bash -lc "sleep 30 && /opt/flink/bin/flink run -d -m jobmanager:8081 -py /opt/flink/flink_app/density_alert.py; tail -f /dev/null"
    networks:
      - flink-network
  # ──── NEO4J (Persistencia de Grafos) ───────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474" # Neo4j Browser (interfaz web)
      - "7687:7687" # Protocolo Bolt (driver Python)
    environment:
      NEO4J_AUTH: neo4j/opensky_secret
    volumes:
      - neo4j_data:/data
    networks:
      - flink-network

  # ──── BACKEND (FastAPI) ────────────────────────────────────────
  backend:
    build: ./backend
    depends_on:
      - kafka
      - neo4j
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_ALERT_TOPIC: flight-alerts
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: opensky_secret
    networks:
      - flink-network

networks:
  flink-network:
    driver: bridge

volumes:
  kafka_data: {}
  neo4j_data: {}
